<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botany Suggestion Group Bangladesh FiFa world cup ip Tv by Tareq</title>
    <!-- Plyr CSS (ভিডিও প্লেয়ার স্টাইলিশ করার জন্য) -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #0b0b0b; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        .header { 
            background: #c62828; 
            padding: 15px; 
            font-size: 18px; 
            font-weight: bold; 
            letter-spacing: 0.5px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .player-container { 
            max-width: 900px; 
            margin: 30px auto; 
            background: #000; 
            border: 2px solid #222; 
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }
        .channel-section { 
            margin: 20px auto;
            max-width: 900px;
            padding: 0 15px;
            text-align: center;
        }
        .btn { 
            background: #1e1e1e; 
            color: #ffd54a; 
            border: 1px solid #333; 
            padding: 12px 20px; 
            font-size: 15px; 
            font-weight: bold;
            cursor: pointer; 
            border-radius: 5px; 
            margin: 5px;
            transition: all 0.3s ease;
        }
        .btn:hover { 
            background: #c62828; 
            color: #fff;
            border-color: #c62828;
        }
        .active-btn {
            background: #c62828;
            color: #fff;
            border-color: #c62828;
        }
        .notice {
            color: #aaa;
            font-size: 13px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- হেডার (আপনার নাম ও গ্রুপ সহ) -->
    <div class="header">Botany Suggestion Group Bangladesh FiFa world cup ip Tv by Tareq 🔴 LIVE</div>

    <!-- ভিডিও প্লেয়ার বক্স -->
    <div class="player-container">
        <video id="player" controls crossorigin playsinline></video>
    </div>

    <!-- চ্যানেল লিস্ট ও কন্ট্রোল বোতাম -->
    <div class="channel-section">
        <button id="btn-fifa" class="btn" onclick="playChannel('https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8')">
            ⚽ FIFA WORLD CUP LIVE
        </button>
        
        <button id="btn-ptv" class="btn" onclick="playChannel('https://live6.asimxtech.online/ptv/index.m3u8', 'btn-ptv')">
            🏏 PTV SPORTS LIVE
        </button>
        
        <p class="notice">* যে চ্যানেলটি দেখতে চান তার ওপর ক্লিক করুন। লোড হতে সমস্যা হলে পেজটি রিফ্রেশ (Refresh) করুন।</p>
    </div>

    <!-- HLS লাইব্রেরি এবং Plyr Script -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        const video = document.getElementById('player');
        let hls = null;

        // প্লেয়ার কনফিগারেশন
        const player = new Plyr(video, {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
            tooltips: { controls: true, seek: true }
        });

        function playChannel(streamUrl, btnId) {
            // আগের কোনো স্ট্রিম চালু থাকলে তা বন্ধ করার জন্য
            if (hls) {
                hls.destroy();
            }

            // বোতামের কালার হাইলাইট পরিবর্তন করার জন্য
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active-btn'));
            if(btnId) {
                document.getElementById(btnId).classList.add('active-btn');
            }

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(function(error) {
                        console.log("Autoplay blocked, waiting for user action");
                    });
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // আইফোন বা সাফারি ব্রাউজারের জন্য
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        // পেজ লোড হওয়া মাত্রই অটোমেটিক প্রথমে ফিফা ওয়ার্ল্ড কাপ চ্যানেলটি চালু হবে
        window.addEventListener('DOMContentLoaded', () => {
            playChannel('https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8', 'btn-fifa');
        });
    </script>
</body>
</html>
