<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSports HD - লাইভ</title>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        #videoContainer {
            width: 100%;
            max-width: 960px;
            aspect-ratio: 16 / 9;
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .info {
            color: #ccc;
            margin-top: 12px;
            font-size: 14px;
            text-align: center;
        }
        .status {
            margin-top: 6px;
            color: #f00;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="videoContainer">
        <video id="video" controls autoplay playsinline></video>
    </div>
    <div class="info">TSports HD - সরাসরি</div>
    <div class="status" id="status">সংযোগ করা হচ্ছে...</div>

    <!-- hls.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const streamUrl = "http://198.195.239.50:8095/Tsports/index.m3u8";

        function playStream() {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    statusEl.textContent = "লাইভ চালু আছে";
                    statusEl.style.color = "#0f0";
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                statusEl.textContent = "নেটওয়ার্ক সমস্যা অথবা সার্ভার ডাউন।";
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                statusEl.textContent = "মিডিয়া লোড করা যায়নি, চ্যানেল বন্ধ থাকতে পারে।";
                                break;
                            default:
                                statusEl.textContent = "স্ট্রিম চালু করা সম্ভব হয়নি। লিংক মেয়াদোত্তীর্ণ।";
                                break;
                        }
                        statusEl.style.color = "#f00";
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari native HLS
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                    statusEl.textContent = "লাইভ চালু আছে (Safari)";
                    statusEl.style.color = "#0f0";
                });
                video.addEventListener('error', () => {
                    statusEl.textContent = "স্ট্রিম লোড করতে ব্যর্থ। লিংক অকার্যকর।";
                    statusEl.style.color = "#f00";
                });
            } else {
                statusEl.textContent = "আপনার ব্রাউজার HLS সাপোর্ট করে না।";
                statusEl.style.color = "#f00";
            }
        }

        playStream();
    </script>
</body>
</html>
